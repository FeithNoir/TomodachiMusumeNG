<div class="glass-panel modal-container fade-in equipment-panel" [class]="panelClass()">

  <button class="close-btn-round" (click)="onClose()" [attr.aria-label]="getText('close')">
    <span>✕</span>
  </button>

  <div class="panel-header">
    <h3 class="modal-title">{{ getText('equipmentTitle') }}</h3>
  </div>

  <div class="equipment-layout scroll-area" [class.equipment-layout--split]="showInventoryPicker()">
    <div class="equipment-main">
      <div class="equipment-rows">
        <section class="equipment-row equipment-row--stats">
          <h4 class="section-heading">{{ getText('statsTitle') }}</h4>
          <div class="stats-row">
            @for (key of statKeys; track key) {
              <app-stat-bar
                [label]="getStatLabel(key)"
                [statKey]="key"
                [value]="totalStats()[key]"
                [baseValue]="baseStats()[key]">
              </app-stat-bar>
            }
          </div>
        </section>

        <section class="equipment-row equipment-row--slots">
          <div class="equipment-row__header">
            <h4 class="section-heading">{{ getText('equippedTitle') }}</h4>
            <button type="button"
                    class="inventory-link-btn"
                    [class.inventory-link-btn--active]="showInventoryPicker()"
                    (click)="toggleInventoryPicker()"
                    [attr.aria-label]="getText('openInventoryEquip')">
              <img src="/assets/icons/inventory.svg" alt="" class="inventory-link-icon">
              <span>{{ getText('openInventoryEquip') }}</span>
            </button>
          </div>

          <div class="equipment-slot-grid">
            @for (slot of slots; track slot.key) {
              <button type="button"
                      [class]="'equipment-slot interactive-card ' + getRarityClass(equipped()[slot.key])"
                      [style]="getRarityStyle(equipped()[slot.key])"
                      [class.equipment-slot--filled]="equipped()[slot.key]"
                      (click)="handleEquippedSlotClick(slot.key)">
                <span class="slot-label">{{ getText(slot.labelKey) }}</span>
                @if (equipped()[slot.key]; as itemId) {
                  <img [src]="getItemPath(itemId)" [alt]="getItemName(itemId)" class="item-img slot-img">
                  <span class="slot-item-name">{{ getItemName(itemId) }}</span>
                } @else {
                  <span class="text-dim">{{ getText('emptySlot') }}</span>
                }
              </button>
            }
          </div>
        </section>
      </div>
    </div>

    @if (showInventoryPicker()) {
      <aside class="equipment-inventory-pane">
        <app-inventory [embedded]="true"></app-inventory>
      </aside>
    }
  </div>
</div>
