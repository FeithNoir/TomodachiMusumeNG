<div class="glass-panel modal-container modal-container--md fade-in">

  <button class="close-btn-round" (click)="onClose()">
    <span>✕</span>
  </button>

  <div class="panel-header">
    <h3 class="modal-title">{{ getText('inventoryTitle') }}</h3>
    <span class="pill pill--sm">{{ inventory().length }} / {{ maxInventorySlots }}</span>
  </div>

  <div class="inventory-grid scroll-area">
    @for (item of inventory(); track item.id) {
    <div class="interactive-card inventory-item"
         [class.interactive-card--equipped]="isEquipped(item.id)"
         (click)="handleItemClick(item.id)">

      <div class="item-visual">
        <img [src]="getItemPath(item.id)" [alt]="getItemName(item.id)" class="item-img">
      </div>

      <span class="badge-count">{{ item.quantity }}</span>

      @if (isEquipped(item.id)) {
      <span class="badge-equipped">E</span>
      }
    </div>
    } @empty {
    <div class="empty-state">
      <p>{{ getText('noItemsMsg') }}</p>
    </div>
    }
  </div>

</div>
