<div class="assignee-picker">
  @if (energyCost > 0) {
    <p class="text-dim assignee-hint">{{ getText('interactEnergyCost', energyCost) }}</p>
  }

  <div class="assignee-grid scroll-area">
    @for (option of assignees; track option.id) {
      <button
        type="button"
        class="assignee-card interactive-card"
        [class.assignee-card--disabled]="!option.available"
        (click)="selectAssignee(option)">
        <div class="assignee-visual">
          @if (isCharacter(option)) {
            <app-minigame-sprite [participant]="characterParticipant" [scale]="0.42" />
          } @else if (isEmoji(option)) {
            <span class="assignee-emoji">{{ displayVisual(option) }}</span>
          } @else {
            <img [src]="displayVisual(option)" alt="" class="assignee-img" />
          }
        </div>
        <span class="assignee-label">{{ option.label }}</span>
        <span class="assignee-type text-dim">
          {{ option.type === 'character' ? getText('missionAssigneeTypeCharacter') : getText('missionAssigneeTypePet') }}
        </span>
        @if (!option.available && option.unavailableReasonKey) {
          <span class="assignee-lock">{{ getText(option.unavailableReasonKey) }}</span>
        }
      </button>
    }
  </div>

  <button type="button" class="btn-outline-gold assignee-back" (click)="back.emit()">
    {{ getText('interactBack') }}
  </button>
</div>
