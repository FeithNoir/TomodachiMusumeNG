@if (!hasCompletedIntro()) {
<app-tutorial></app-tutorial>
}

<div class="game-layout-container">
  <!-- Menú lateral hamburguesa -->
  <div class="layout-menu">
    <app-menu (menuAction)="handleMenuAction($event)"></app-menu>
  </div>

  <!-- Indicadores de estado (dinero, afinidad...) -->
  <div class="layout-info">
    <app-info></app-info>
  </div>

  <!-- Barra de acciones principal (hablar, misión, etc.) -->
  <div class="layout-sidebar">
    <app-sidebar [disabledActions]="disabledSidebarActions()" (action)="handleSidebarAction($event)"></app-sidebar>
  </div>

  <!-- Área principal donde se renderizarán las páginas (como 'main') -->
  <main class="layout-main">
    <router-outlet></router-outlet>
  </main>
</div>

<!-- ========= MODALES ========= -->
<!-- Su visibilidad se controla desde el .ts del layout -->

<!-- Modal de Diálogo -->
@if (isDialogueVisible()) {
<div class="modal-overlay dialogue-overlay-container">
  <app-dialogue [dialogue]="currentDialogue()" (optionSelected)="handleDialogueOption($event)"
    (close)="closeActiveModal()"></app-dialogue>
</div>
}

<!-- Modal de Equipo -->
@if (isEquipmentVisible()) {
<div class="modal-overlay">
  <app-equipment (close)="closeActiveModal()" (openInventory)="openInventoryFromEquipment()"></app-equipment>
</div>
}

<!-- Modal de Inventario -->
@if (isInventoryVisible()) {
<div class="modal-overlay">
  <app-inventory (close)="closeActiveModal()"></app-inventory>
</div>
}

<!-- Modal de Crafteo -->
@if (isCraftingVisible()) {
<div class="modal-overlay">
  <app-crafting (close)="closeActiveModal()"></app-crafting>
</div>
}

<!-- Modal de Tienda -->
@if (isMarketVisible()) {
<div class="modal-overlay">
  <app-shop (closeShop)="closeActiveModal()"></app-shop>
</div>
}

<!-- Modal de Misión -->
@if (isMissionVisible()) {
<div class="modal-overlay" (click)="closeActiveModal()">
  <app-mission (click)="$event.stopPropagation()" (close)="closeActiveModal()"></app-mission>
</div>
}

<!-- Modal de Interactuar / Minijuegos -->
@if (isInteractVisible()) {
<div class="modal-overlay" (click)="closeActiveModal()">
  <app-interact (click)="$event.stopPropagation()" (close)="closeActiveModal()"></app-interact>
</div>
}

<!-- Modal de Opciones -->
@if (isOptionsVisible()) {
<div class="modal-overlay">
  <app-options (close)="closeActiveModal()"></app-options>
</div>
}

<!-- Modal de Galería -->
@if (isGalleryVisible()) {
<div class="modal-overlay" (click)="closeActiveModal()">
  <app-gallery (click)="$event.stopPropagation()" (close)="closeActiveModal()"></app-gallery>
</div>
}

<app-mission-reward-modal></app-mission-reward-modal>
<app-notification></app-notification>
